[build]
  # Build the Astro frontend and publish generated static files
  command = "cd frontend && npm install && npm run build"
  publish = "frontend/dist"

[context.production.environment]
# Set `BACKEND_URL` to your backend host (example: api.example.com)
# You can also set this value in the Netlify UI under Site settings → Build & deploy → Environment.
BACKEND_URL = "YOUR_BACKEND_URL"

[[redirects]]
  from = "/api/*"
  to = "https://$BACKEND_URL/:splat"
  status = 200
  force = true

# Notes:
# - Replace `YOUR_BACKEND_URL` with the URL where your Dockerized Go backend is hosted.
# - Netlify will publish the `static/` folder. API calls to `/api/*` will be proxied to the backend URL.