[build]
  publish = "static"
  command = "echo 'Static site; no build required'"

[[redirects]]
  from = "/api/*"
  to = "https://YOUR_BACKEND_URL/:splat"
  status = 200
  force = true

# Notes:
# - Replace `YOUR_BACKEND_URL` with the URL where your Dockerized Go backend is hosted.
# - Netlify will publish the `static/` folder. API calls to `/api/*` will be proxied to the backend URL.