<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#4caf6e"/>
      <stop offset="100%" stop-color="#1a5c30"/>
    </radialGradient>
    <linearGradient id="grain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe566"/>
      <stop offset="100%" stop-color="#d49000"/>
    </linearGradient>
    <linearGradient id="stalk" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c8a400"/>
      <stop offset="100%" stop-color="#ffe566"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#00000055"/>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="32" cy="32" r="31.5" fill="url(#bg)"/>
  <circle cx="32" cy="32" r="29.5" fill="none" stroke="rgba(255,255,255,0.13)" stroke-width="1"/>

  <g filter="url(#sh)">
    <!-- Stalks fanning out -->
    <path d="M32 50 Q27 42 22 36" stroke="url(#stalk)" stroke-width="1.7" stroke-linecap="round" fill="none"/>
    <path d="M32 50 Q24 40 18 31" stroke="url(#stalk)" stroke-width="1.4" stroke-linecap="round" fill="none"/>
    <line x1="32" y1="53" x2="32" y2="14" stroke="url(#stalk)" stroke-width="2.1" stroke-linecap="round"/>
    <path d="M32 50 Q37 42 42 36" stroke="url(#stalk)" stroke-width="1.7" stroke-linecap="round" fill="none"/>
    <path d="M32 50 Q40 40 46 31" stroke="url(#stalk)" stroke-width="1.4" stroke-linecap="round" fill="none"/>

    <!-- Binding -->
    <ellipse cx="32" cy="49.5" rx="5" ry="2.2" fill="#b8900a"/>
    <ellipse cx="32" cy="49.5" rx="5" ry="2.2" fill="none" stroke="#ffe566" stroke-width="0.8" opacity="0.5"/>

    <!-- Grain heads -->
    <!-- center -->
    <ellipse cx="32" cy="12.5" rx="3.3" ry="5.8" fill="url(#grain)"/>
    <ellipse cx="32" cy="11.5" rx="1.4" ry="2.6" fill="rgba(255,255,255,0.28)"/>
    <line x1="32" y1="7" x2="32" y2="5" stroke="#ffe566" stroke-width="1.1" stroke-linecap="round"/>

    <!-- inner left -->
    <ellipse cx="22" cy="33" rx="3.1" ry="5.5" fill="url(#grain)" transform="rotate(-30 22 33)"/>
    <ellipse cx="22" cy="31.8" rx="1.3" ry="2.5" fill="rgba(255,255,255,0.28)" transform="rotate(-30 22 31.8)"/>
    <line x1="19.8" y1="26.2" x2="18.4" y2="24" stroke="#ffe566" stroke-width="1" stroke-linecap="round"/>

    <!-- inner right -->
    <ellipse cx="42" cy="33" rx="3.1" ry="5.5" fill="url(#grain)" transform="rotate(30 42 33)"/>
    <ellipse cx="42" cy="31.8" rx="1.3" ry="2.5" fill="rgba(255,255,255,0.28)" transform="rotate(30 42 31.8)"/>
    <line x1="44.2" y1="26.2" x2="45.6" y2="24" stroke="#ffe566" stroke-width="1" stroke-linecap="round"/>

    <!-- outer left -->
    <ellipse cx="17.5" cy="28" rx="2.8" ry="5.1" fill="url(#grain)" transform="rotate(-42 17.5 28)"/>
    <ellipse cx="17.5" cy="26.9" rx="1.2" ry="2.3" fill="rgba(255,255,255,0.28)" transform="rotate(-42 17.5 26.9)"/>
    <line x1="14.5" y1="22.5" x2="13" y2="20.3" stroke="#ffe566" stroke-width="0.9" stroke-linecap="round"/>

    <!-- outer right -->
    <ellipse cx="46.5" cy="28" rx="2.8" ry="5.1" fill="url(#grain)" transform="rotate(42 46.5 28)"/>
    <ellipse cx="46.5" cy="26.9" rx="1.2" ry="2.3" fill="rgba(255,255,255,0.28)" transform="rotate(42 46.5 26.9)"/>
    <line x1="49.5" y1="22.5" x2="51" y2="20.3" stroke="#ffe566" stroke-width="0.9" stroke-linecap="round"/>
  </g>

  <!-- Outer rim -->
  <circle cx="32" cy="32" r="31.5" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1.5"/>
</svg>
