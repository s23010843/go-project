<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" fill="none">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Bot head/body rounded rect -->
  <rect x="10" y="14" width="36" height="28" rx="9" ry="9" fill="url(#bodyGrad)" stroke="rgba(255,255,255,0.55)" stroke-width="1.6"/>

  <!-- Antenna -->
  <line x1="28" y1="14" x2="28" y2="8" stroke="rgba(255,255,255,0.75)" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="28" cy="6.5" r="2.4" fill="rgba(255,255,255,0.9)" filter="url(#glow)"/>

  <!-- Eyes -->
  <circle cx="21" cy="26" r="3.5" fill="white" opacity="0.95"/>
  <circle cx="35" cy="26" r="3.5" fill="white" opacity="0.95"/>
  <!-- Pupils -->
  <circle cx="21.8" cy="26.8" r="1.6" fill="rgba(46,125,50,0.9)"/>
  <circle cx="35.8" cy="26.8" r="1.6" fill="rgba(46,125,50,0.9)"/>
  <!-- Eye glint -->
  <circle cx="22.4" cy="25.6" r="0.6" fill="white" opacity="0.8"/>
  <circle cx="36.4" cy="25.6" r="0.6" fill="white" opacity="0.8"/>

  <!-- Mouth / smile -->
  <path d="M21 33 Q28 38 35 33" stroke="white" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.9"/>

  <!-- Side ears / bolts -->
  <rect x="7" y="22" width="4" height="8" rx="2" fill="rgba(255,255,255,0.5)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <rect x="45" y="22" width="4" height="8" rx="2" fill="rgba(255,255,255,0.5)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>

  <!-- Wheat icon - small badge bottom right -->
  <circle cx="43" cy="40" r="7" fill="rgba(255,230,80,0.92)" />
  <line x1="43" y1="45" x2="43" y2="36" stroke="#7a5c00" stroke-width="1.2" stroke-linecap="round"/>
  <ellipse cx="40.5" cy="39" rx="1.5" ry="2.5" fill="#c8900a" transform="rotate(-30 40.5 39)"/>
  <ellipse cx="45.5" cy="39" rx="1.5" ry="2.5" fill="#c8900a" transform="rotate(30 45.5 39)"/>
  <ellipse cx="43" cy="36.5" rx="1.3" ry="2.2" fill="#c8900a"/>
</svg>
