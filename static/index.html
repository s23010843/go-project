<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farm Market Price Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>

<header>
    <h1>🌾 Farm Market Price Portal</h1>
    <p>Live crop prices across markets — search, filter &amp; analyse</p>
</header>

<div class="page-wrapper">

    <!-- Search & Filter -->
    <div class="card">
        <div class="card-title">🔍 Filter Prices</div>
        <div class="controls">
            <input type="text" id="searchInput" placeholder="Search crop…">
            <select id="marketSelect">
                <option value="">All Markets</option>
                <option value="Central">Central</option>
                <option value="North">North</option>
                <option value="South">South</option>
            </select>
            <button onclick="filterPrices()">Apply Filter</button>
            <button class="btn-secondary" onclick="downloadCSV()">⬇ Download CSV</button>
        </div>
    </div>

    <!-- Price Table -->
    <div class="card">
        <div class="card-title">📋 Price List</div>
        <div class="table-wrapper">
            <table id="priceTable">
                <thead>
                    <tr>
                        <th>Crop</th>
                        <th>Market</th>
                        <th>Price (₹)</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <!-- Chart -->
    <div class="card">
        <div class="card-title">📊 Price Comparison</div>
        <canvas id="priceChart"></canvas>
    </div>

    <!-- Price Alert -->
    <div class="card">
        <div class="card-title">🔔 Set Price Alert</div>
        <div class="alert-form">
            <input type="number" id="alertPrice" placeholder="Enter target price (₹)">
            <button onclick="setAlert()">Set Alert</button>
        </div>
        <p id="alertMessage"></p>
    </div>

</div><!-- /.page-wrapper -->

<!-- ── Floating Chat Widget ───────────────────────────── -->
<div id="chatWidget" class="chat-widget" aria-hidden="true">
  <div class="chat-widget-header">
    <div class="chat-widget-title">
      <img src="bot.svg" alt="Bot" class="chat-header-icon">
      <span>Price Assistant</span>
    </div>
    <button id="chatCloseBtn" class="chat-close-btn" aria-label="Close chat">
      <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 5l10 10M15 5L5 15" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
  <div id="chatWindow" class="chat-window"></div>
  <div class="chat-input-row">
    <input id="chatInput" type="text" placeholder="Ask e.g. Wheat in Central…" autocomplete="off">
    <button id="sendBtn" aria-label="Send">
      <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 10L18 2l-4 8 4 8L2 10z" fill="white"/>
      </svg>
    </button>
  </div>
</div>

<!-- FAB toggle button -->
<button id="chatFab" class="chat-fab" aria-label="Open Price Assistant">
  <img src="bot.svg" alt="Chat" class="fab-icon fab-icon--bot">
  <svg class="fab-icon fab-icon--close" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <path d="M5 5l10 10M15 5L5 15" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  </svg>
</button>

<script src="script.js"></script>
</body>
</html>
